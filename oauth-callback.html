<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikTok OAuth callback — Three Singsters</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.45; }
    code, textarea { display: block; width: 100%; font-size: 13px; word-break: break-all; }
    textarea { min-height: 6rem; margin: 0.5rem 0 1rem; }
    .ok { color: #0a7; }
    .err { color: #c22; }
  </style>
</head>
<body>
  <h1>TikTok authorization</h1>
  <p id="status">Reading callback…</p>
  <label for="code">Copy this code into the terminal when <code>tiktok_oauth_setup.py</code> asks for it:</label>
  <textarea id="code" readonly></textarea>
  <button type="button" id="copy">Copy code</button>
  <script>
    const params = new URLSearchParams(window.location.search);
    const err = params.get("error");
    const desc = params.get("error_description") || "";
    const code = params.get("code") || "";
    const status = document.getElementById("status");
    const box = document.getElementById("code");
    if (err) {
      status.className = "err";
      status.textContent = "Error: " + err + (desc ? " — " + desc : "");
    } else if (code) {
      status.className = "ok";
      status.textContent = "Success — code received. Paste it into the terminal.";
      box.value = code;
    } else {
      status.textContent = "No code in URL. Start again from tiktok_oauth_setup.py.";
    }
    document.getElementById("copy").onclick = async () => {
      if (!box.value) return;
      await navigator.clipboard.writeText(box.value);
      status.textContent = "Copied.";
    };
  </script>
</body>
</html>
